<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>MAZKIPLAY RED TEAM TOOL</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap');
body { font-family: 'Fira Code', monospace; background-color: #000; color: #0f0; overflow: hidden; margin: 0; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
.glitch { position: relative; animation: glitch 1s linear infinite; }
@keyframes glitch { 2%, 64% { transform: translate(2px, 0) skew(0deg); } 4%, 60% { transform: translate(-2px, 0) skew(0deg); } 62% { transform: translate(0, 0) skew(5deg); } }
.scanline { width: 100%; height: 100px; z-index: 10; background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 0, 0.1) 50%, rgba(0, 0, 0, 0) 100%); opacity: 0.1; position: absolute; bottom: 100%; animation: scanline 8s linear infinite; pointer-events: none; }
@keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
.hacker-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
.blood-red-glow { box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); border: 1px solid #ff0000; }
.fade-in { animation: fadeIn 0.8s ease-in forwards; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
input { background: rgba(0, 10, 0, 0.9) !important; border: 1px solid #0f0 !important; color: #0f0 !important; appearance: none; -webkit-appearance: none; }
.terminal-scroll::-webkit-scrollbar { width: 4px; }
.terminal-scroll::-webkit-scrollbar-thumb { background: #ff0000; }
.no-tap { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<canvas id="canvas" class="hacker-bg"></canvas>
<div class="scanline"></div>
<div id="loginScreen" class="flex flex-col items-center justify-center min-h-screen w-full p-4 text-center">
<div class="bg-black/95 p-6 sm:p-10 rounded-lg border border-green-500 max-w-sm w-full backdrop-blur-md">
<h1 class="glitch text-2xl sm:text-3xl font-bold mb-1 text-green-400">WELCOME TO</h1>
<h2 class="text-xl sm:text-2xl font-black mb-8 tracking-tighter text-white uppercase">Mazkiplay Cyber</h2>
<div class="space-y-5">
<div class="text-left">
<label class="block text-[10px] uppercase tracking-widest mb-1 text-green-600">Username</label>
<input type="text" id="user" placeholder="ID Red Team" class="w-full p-4 rounded outline-none focus:ring-1 focus:ring-green-400">
</div>
<div class="text-left">
<label class="block text-[10px] uppercase tracking-widest mb-1 text-green-600">Access Key</label>
<input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded outline-none focus:ring-1 focus:ring-green-400">
</div>
<button onclick="checkLogin()" class="no-tap w-full py-4 bg-green-600 text-black font-black hover:bg-green-400 active:scale-95 transition-all shadow-lg shadow-green-900/20 text-sm">AUTHORIZE ACCESS</button>
</div>
<p id="loginMsg" class="mt-4 text-xs font-bold text-red-500 h-4"></p>
</div>
<div id="successScreen" class="hidden flex flex-col items-center justify-center min-h-screen w-full p-6 text-center fade-in">
<div class="bg-black/95 p-8 rounded-2xl border-2 border-green-500 shadow-[0_0_40px_rgba(34,197,94,0.3)] max-w-sm w-full">
<div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
<i class="fas fa-user-shield text-4xl text-green-500"></i>
</div>
<h1 class="text-xl font-black mb-2 text-white">ACCESS GRANTED</h1>
<p class="text-green-400 text-xs mb-10">Identity Verified. Welcome back, Researcher.</p>
<button onclick="enterDashboard()" class="no-tap w-full py-4 bg-green-500 text-black font-black text-lg hover:scale-105 active:scale-95 transition-all uppercase">Open Terminal</button>
</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const charList = "010101<>[]{}/?=+*^%$#@!アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);
let matrixColor = "#0f0";
function drawMatrix() {
ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = matrixColor;
ctx.font = fontSize + "px monospace";
for (let i = 0; i < drops.length; i++) {
const text = charList.charAt(Math.floor(Math.random() * charList.length));
ctx.fillText(text, i * fontSize, drops[i] * fontSize);
if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
drops[i] = 0;
}
drops[i]++;
}
}
setInterval(drawMatrix, 40);
function checkLogin() {
const u = document.getElementById('user').value.toLowerCase().trim();
const p = document.getElementById('pass').value.trim();
if (u === "kiply" && p === "kiply123") {
document.getElementById('loginScreen').classList.add('hidden');
document.getElementById('successScreen').classList.remove('hidden');
} else {
document.getElementById('loginMsg').innerText = "INVALID CREDENTIALS";
setTimeout(() => document.getElementById('loginMsg').innerText = "", 2000);
}
}
function enterDashboard() {
alert('Dashboard Terminal Active. System Ready.');
}
</script>
</body>
</html>
