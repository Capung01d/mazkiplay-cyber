<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAZKIPLAY RED TEAM</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
body { background-color: #000; color: #0f0; font-family: 'Fira Code', monospace; overflow: hidden; margin: 0; }
.glitch { animation: glitch 1s linear infinite; }
@keyframes glitch {
  0% { transform: translate(0) }
  20% { transform: translate(-2px, 2px) }
  40% { transform: translate(-2px, -2px) }
  60% { transform: translate(2px, 2px) }
  80% { transform: translate(2px, -2px) }
  100% { transform: translate(0) }
}
#canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; }
.screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; position: relative; padding: 20px; }
.box { background: rgba(0, 0, 0, 0.85); border: 1px solid #0f0; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 15px rgba(0,255,0,0.2); backdrop-filter: blur(5px); }
.box-red { border-color: #f00; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
input { background: #001100; border: 1px solid #0f0; color: #0f0; padding: 15px; width: 100%; margin-bottom: 15px; outline: none; font-family: inherit; }
input.input-red { background: #110000; border-color: #f00; color: #f00; }
button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
button:active { transform: scale(0.95); }
button.btn-red { background: #f00; color: #fff; }
.hidden { display: none !important; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #f00; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="loginScreen" class="screen">
  <div class="box">
    <h1 class="glitch text-2xl font-bold mb-6">MAZKIPLAY CYBER</h1>
    <input type="text" id="user" placeholder="ID Researcher">
    <input type="password" id="pass" placeholder="Access Key">
    <button onclick="login()">AUTHORIZE</button>
    <p id="msg" class="text-red-500 mt-4 text-xs font-bold h-4"></p>
  </div>
</div>

<div id="dashScreen" class="screen hidden">
  <div class="box box-red">
    <h1 class="text-red-500 text-xl font-bold mb-2 tracking-widest">TARGET ACQUISITION</h1>
    <p class="text-[10px] text-red-700 mb-6 uppercase">Input Phone Identifier</p>
    <input type="tel" id="target" placeholder="812xxxxxx" class="input-red text-center text-lg font-bold">
    <button onclick="hack()" class="btn-red">INITIATE EXPLOIT</button>
  </div>
</div>

<div id="overlayScreen" class="screen hidden" style="background: rgba(0,0,0,0.95);">
  <div class="box box-red border-none shadow-none">
    <h2 id="title" class="text-red-500 mb-6 font-bold tracking-widest text-lg">SYSTEM OVERRIDE...</h2>
    <div style="width: 100%; background: #222; height: 8px; margin-bottom: 20px; border-radius: 10px; overflow: hidden;">
      <div id="bar" style="width: 0%; height: 100%; background: #f00; transition: width 0.3s;"></div>
    </div>
    <div id="log" style="height: 150px; overflow-y: auto; text-align: left; font-size: 11px; color: #0f0; margin-bottom: 20px; background: #000; padding: 10px; border: 1px solid #0f0;"></div>
    <button id="done" class="hidden btn-red" onclick="location.reload()">RETURN TO PANEL</button>
  </div>
</div>

<script>
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');

function resize() {
  cvs.width = window.innerWidth;
  cvs.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const chars = "010101<>[]{}XMAZKI!@#$";
const drops = Array(Math.floor(cvs.width / 15)).fill(1);
let matrixColor = "#0f0";

setInterval(() => {
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  ctx.fillStyle = matrixColor;
  ctx.font = "15px monospace";
  
  for(let i = 0; i < drops.length; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, i * 15, drops[i] * 15);
    if(drops[i] * 15 > cvs.height && Math.random() > 0.95) drops[i] = 0;
    drops[i]++;
  }
}, 50);

function login() {
  const u = document.getElementById('user').value.toLowerCase();
  const p = document.getElementById('pass').value;
  if(u === "kiply" && p === "kiply123") {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashScreen').classList.remove('hidden');
    matrixColor = "#f00";
  } else {
    document.getElementById('msg').innerText = "ACCESS DENIED";
    setTimeout(() => document.getElementById('msg').innerText = "", 2000);
  }
}

function hack() {
  if(document.getElementById('target').value.length < 5) return;
  document.getElementById('dashScreen').classList.add('hidden');
  document.getElementById('overlayScreen').classList.remove('hidden');
  
  let p = 0;
  let idx = 0;
  const msgs = [
    "[INFO] Establishing secure connection...",
    "[INFO] Bypassing target firewall...",
    "[WARN] Security enclave detected...",
    "[INFO] Injecting root payload...",
    "[INFO] Extracting filesystem keys...",
    "[OK] Exploit successful. Backdoor opened."
  ];
  const log = document.getElementById('log');
  const bar = document.getElementById('bar');
  
  const int = setInterval(() => {
    p += Math.floor(Math.random() * 8) + 2;
    if(p > 100) p = 100;
    bar.style.width = p + "%";
    
    if(Math.random() > 0.6 && idx < msgs.length) {
      log.innerHTML += "<div>" + msgs[idx++] + "</div>";
      log.scrollTop = log.scrollHeight;
    }
    
    if(p === 100) {
      clearInterval(int);
      if(idx < msgs.length) {
        log.innerHTML += "<div>" + msgs[msgs.length-1] + "</div>";
        log.scrollTop = log.scrollHeight;
      }
      document.getElementById('title').innerText = "TARGET COMPROMISED";
      document.getElementById('title').style.color = "#0f0";
      bar.style.background = "#0f0";
      document.getElementById('done').classList.remove('hidden');
    }
  }, 300);
}
</script>
</body>
</html>
